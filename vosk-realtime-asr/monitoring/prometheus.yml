global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Vosk ASR 服务监控
  - job_name: 'vosk-asr-server'
    static_configs:
      - targets: ['localhost:9091']
    metrics_path: '/metrics'

  # 可选：Node Exporter（系统监控）
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['localhost:9100']