<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="火山引擎 bigmodel 流式一句话识别 · 分角色实时转写">
  <title>火山引擎 · 分角色实时转写</title>

  <!-- 预加载 AudioWorklet -->
  <link rel="preload" href="/audio-processor.js" as="script">

  <!-- 内联关键样式 -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui,
                   -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   'Apple Color Emoji', 'Segoe UI Emoji',
                   'Noto Color Emoji', 'Twemoji Mozilla', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      background: #0f0f1a;
      color: #e0e0e0;
      overflow-x: hidden;
    }

    #root {
      min-height: 100vh;
    }

    /* 加载动画 */
    .loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 20px;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #3a3a5e;
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- React 应用挂载点 -->
  <div id="root">
    <!-- 加载中状态（React 加载前显示） -->
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <div class="loading-text">正在加载...</div>
    </div>
  </div>

  <!-- 应用入口 -->
  <script type="module" src="/src/index.tsx"></script>

  <!-- 错误处理 -->
  <script>
    window.addEventListener('error', function(e) {
      console.error('Application error:', e);
    });

    // 检查浏览器支持
    if (!window.AudioContext && !window.webkitAudioContext) {
      document.getElementById('root').innerHTML = `
        <div style="padding: 50px; text-align: center;">
          <h2 style="color: #ef4444;">浏览器不支持</h2>
          <p style="color: #888; margin-top: 20px;">您的浏览器不支持 Web Audio API，请使用现代浏览器（Chrome、Firefox、Safari、Edge）。</p>
        </div>
      `;
    }
  </script>
</body>
</html>
